<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f5f0e8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>7人からの手紙。</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="apple-touch-icon" href="images/icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css?v=0.1.0">
</head>
<body>

<div class="app">
  <header class="header">
    <h1 class="header-title">7人からの手紙。</h1>
    <p class="header-sub">あなたの1週間を、届けます。</p>
    <a href="hints.html" class="seal-btn"><img src="images/seal.png" alt="ヒント"></a>
  </header>

  <div id="gridView" class="grid-view">
    <div id="compBar" class="comp-bar"></div>
    <div id="letterGrid" class="letter-grid">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <div id="letterView" class="letter-view" style="display:none">
    <div class="letter-paper">
      <div class="letter-bg" id="letterBg"></div>
      <div class="letter-content" id="letterContent"></div>
    </div>
    <div class="letter-nav" style="display:none">
      <button id="prevLetter" class="letter-nav-btn">&larr; 前の手紙</button>
      <button id="backToGrid" class="letter-nav-btn letter-nav-back">一覧に戻る</button>
      <button id="nextLetter" class="letter-nav-btn">次の手紙 &rarr;</button>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-copy">&copy; おはようカノジョ / hasyamo</div>
    <div class="footer-version">v0.1.0</div>
  </footer>
</div>

<!-- Update Modal -->
<div id="updateModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">アップデート</div>
    <div id="updateBody" class="modal-sub" style="white-space:pre-wrap;margin-bottom:20px"></div>
    <button id="updateCloseBtn" class="modal-btn">OK</button>
  </div>
</div>

<script src="app.js?v=0.1.0"></script>
</body>
</html>
